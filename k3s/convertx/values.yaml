namespace: utilities

image:
  repository: ghcr.io/c4illin/convertx
  tag: v0.18.0
  pullPolicy: IfNotPresent

replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

service:
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  hosts:
    - convertx.lan

env:
  - name: HOME
    value: "/tmp"
  - name: XDG_CACHE_HOME
    value: "/tmp/.cache"
  - name: HTTP_ALLOWED
    value: "true"

volumes:
  data:
    hostPath: /opt/k3s-data/convertx
    mountPath: /app/data

resources:
  requests:
    cpu: 10m
    memory: 512Mi
  limits:
    cpu: 400m
    memory: 2Gi
