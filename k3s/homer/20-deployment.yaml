apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
  namespace: dashboard
  labels:
    app: homer
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: homer
  template:
    metadata:
      labels:
        app: homer
    spec:
      containers:
        - name: homer
          image: b4bz/homer
          env:
            - name: INIT_ASSETS
              value: "1" # Force creation of default config if empty
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "10Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - mountPath: /www/assets
              name: assets-vol
      volumes:
        - name: assets-vol
          hostPath:
            path: /mnt/data/k3s-pvc/homer
            type: Directory
