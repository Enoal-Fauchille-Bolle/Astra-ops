apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: notifications
  labels:
    app: ntfy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.21.0
          args: ["serve"]
          env:
            - name: NTFY_BASE_URL
              value: "https://ntfy.enoal.fr"
            - name: NTFY_BEHIND_PROXY
              value: "true"
            - name: NTFY_CACHE_FILE
              value: "/var/cache/ntfy/cache.db"
            - name: NTFY_ATTACHMENT_CACHE_DIR
              value: "/var/cache/ntfy/attachments"
            - name: NTFY_AUTH_FILE
              value: "/var/cache/ntfy/user.db"
            - name: NTFY_AUTH_DEFAULT_ACCESS
              value: "deny-all"
            - name: NTFY_ENABLE_LOGIN
              value: "true"
            - name: NTFY_ENABLE_SIGNUP
              value: "false"
            - name: NTFY_AUTH_ACCESS
              value: "*:*:deny"
            - name: NTFY_AUTH_USERS
              valueFrom:
                secretKeyRef:
                  name: ntfy-secrets
                  key: auth-users
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - mountPath: /var/cache/ntfy
              name: data-vol
      volumes:
        - name: data-vol
          hostPath:
            path: /opt/k3s-data/ntfy/data
            type: DirectoryOrCreate
