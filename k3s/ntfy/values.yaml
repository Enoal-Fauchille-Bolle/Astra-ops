namespace: notifications

image:
  repository: binwiederhier/ntfy
  tag: v2.26.0
  pullPolicy: IfNotPresent

args:
  - "serve"

replicaCount: 1

strategy:
  type: Recreate

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  hosts:
    - ntfy.enoal.fr

env:
  - name: NTFY_BASE_URL
    value: "https://ntfy.enoal.fr"
  - name: NTFY_BEHIND_PROXY
    value: "true"
  - name: NTFY_CACHE_FILE
    value: "/var/cache/ntfy/cache.db"
  - name: NTFY_ATTACHMENT_CACHE_DIR
    value: "/var/cache/ntfy/attachments"
  - name: NTFY_AUTH_FILE
    value: "/var/cache/ntfy/user.db"
  - name: NTFY_AUTH_DEFAULT_ACCESS
    value: "deny-all"
  - name: NTFY_ENABLE_LOGIN
    value: "true"
  - name: NTFY_ENABLE_SIGNUP
    value: "false"
  - name: NTFY_AUTH_ACCESS
    value: "*:*:deny"
  - name: NTFY_AUTH_USERS
    valueFrom:
      secretKeyRef:
        name: ntfy-secrets
        key: auth-users

volumes:
  data:
    hostPath: /opt/k3s-data/ntfy/data
    mountPath: /var/cache/ntfy

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
