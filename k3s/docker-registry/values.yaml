namespace: devops

image:
  repository: registry
  tag: 3.0.0
  pullPolicy: IfNotPresent

replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

service:
  port: 5000
  targetPort: 5000

ingress:
  enabled: true
  hosts:
    - registry.enoal.fr

env:
  - name: REGISTRY_HTTP_ADDR
    value: ":5000"
  - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
    value: "/var/lib/registry"
  - name: REGISTRY_AUTH
    value: "htpasswd"
  - name: REGISTRY_AUTH_HTPASSWD_REALM
    value: "Registry Realm"
  - name: REGISTRY_AUTH_HTPASSWD_PATH
    value: "/auth/htpasswd"
  - name: REGISTRY_HTTP_RELATIVEURLS
    value: "true"
  - name: REGISTRY_HTTP_HOST
    value: "https://registry.enoal.fr"

volumes:
  data:
    hostPath: /opt/k3s-data/docker-registry
    mountPath: /var/lib/registry
  auth:
    secret: docker-registry-secrets
    mountPath: /auth
    readOnly: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

readinessProbe:
  httpGet:
    path: /
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 10
