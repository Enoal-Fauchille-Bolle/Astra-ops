namespace: security

image:
  repository: vaultwarden/server
  tag: 1.36.0
  pullPolicy: IfNotPresent

replicaCount: 1

strategy:
  type: Recreate

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  hosts:
    - vault.enoal.fr

env:
  - name: DOMAIN
    value: "https://vault.enoal.fr"
  - name: SIGNUPS_ALLOWED
    value: "false"
  - name: WEBSOCKET_ENABLED
    value: "true"

envFrom:
  - secretRef:
      name: vaultwarden-secrets

volumes:
  data:
    hostPath: /opt/k3s-data/vaultwarden
    mountPath: /data/

resources:
  requests:
    cpu: 10m
    memory: 237Mi
  limits:
    cpu: 100m
    memory: 384Mi

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 5

externalSecrets:
  - name: vaultwarden-es
    targetName: vaultwarden-secrets
    data:
      - secretKey: ADMIN_TOKEN
        remoteRef:
          key: VAULTWARDEN_ADMIN_TOKEN
      - secretKey: SMTP_HOST
        remoteRef:
          key: SMTP_HOST
      - secretKey: SMTP_PORT
        remoteRef:
          key: SMTP_PORT
      - secretKey: VAULTWARDEN_SMTP_FROM
        remoteRef:
          key: SMTP_FROM
      - secretKey: SMTP_SECURITY
        remoteRef:
          key: SMTP_SECURITY
      - secretKey: SMTP_USERNAME
        remoteRef:
          key: SMTP_USERNAME
      - secretKey: SMTP_PASSWORD
        remoteRef:
          key: VAULTWARDEN_SMTP_PASSWORD
