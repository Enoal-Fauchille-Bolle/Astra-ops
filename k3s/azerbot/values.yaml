image:
  repository: ghcr.io/enoal-fauchille-bolle/azerbot
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 80
  targetPort: 3000

ingress:
  hosts:
    - azerbot.lan

envFrom:
  - secretRef:
      name: azerbot-secrets

probes:
  liveness:
    path: /status
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /status
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    cpu: 100m
    memory: 256Mi

imagePullSecrets:
  - name: regcred-azerbot
