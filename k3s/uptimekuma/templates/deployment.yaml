apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.strategy }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- end }}
      {{- if .Values.dns }}
      dnsPolicy: {{ .Values.dns.policy }}
      dnsConfig:
        nameservers:
          {{- toYaml .Values.dns.nameservers | nindent 10 }}
        searches:
          {{- toYaml .Values.dns.searches | nindent 10 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.args }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          {{- if .Values.envFrom }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          {{- end }}
          {{- if .Values.service }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- end }}
          {{- if .Values.volumes }}
          volumeMounts:
            {{- range $name, $vol := .Values.volumes }}
            - mountPath: {{ $vol.mountPath }}
              name: {{ $name }}-vol
              {{- if $vol.readOnly }}
              readOnly: {{ $vol.readOnly }}
              {{- end }}
              {{- if $vol.subPath }}
              subPath: {{ $vol.subPath }}
              {{- end }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.volumes }}
      volumes:
        {{- range $name, $vol := .Values.volumes }}
        - name: {{ $name }}-vol
          {{- if $vol.configMap }}
          configMap:
            name: {{ $vol.configMap }}
          {{- else }}
          hostPath:
            path: {{ $vol.hostPath }}
            {{- if $vol.hostPathType }}
            type: {{ $vol.hostPathType }}
            {{- else }}
            type: DirectoryOrCreate
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
