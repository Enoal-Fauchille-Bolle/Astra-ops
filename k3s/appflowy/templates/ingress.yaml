apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appflowy-ingress
  namespace: {{ .Values.namespace }}
spec:
  rules:
    - host: {{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: appflowy-nginx
                port:
                  number: 80
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: appflowy-admin
                port:
                  number: 3000
