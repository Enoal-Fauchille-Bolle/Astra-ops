{{- if .Values.appflowyWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: appflowy-worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: appflowy-worker
  template:
    metadata:
      labels:
        app: appflowy-worker
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z appflowy-postgres 5432; do sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z appflowy-redis 6379; do sleep 2; done']
      containers:
        - name: appflowy-worker
          image: "{{ .Values.appflowyWorker.image.repository }}:{{ .Values.appflowyWorker.image.tag }}"
          imagePullPolicy: {{ .Values.appflowyWorker.image.pullPolicy }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: POSTGRES_PASSWORD
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: GOTRUE_JWT_SECRET
            - name: APPFLOWY_WORKER_DATABASE_URL
              value: "postgres://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@appflowy-postgres:5432/{{ .Values.postgres.database }}"
            - name: APPFLOWY_WORKER_REDIS_URL
              value: "redis://appflowy-redis:6379"
            - name: APPFLOWY_S3_USE_MINIO
              value: "true"
            - name: APPFLOWY_S3_MINIO_URL
              value: "http://appflowy-minio:9000"
            - name: APPFLOWY_S3_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: APPFLOWY_S3_REGION
              value: {{ .Values.minio.region | quote }}
            - name: APPFLOWY_S3_ACCESS_KEY
              value: "$(MINIO_ROOT_USER)"
            - name: APPFLOWY_S3_SECRET_KEY
              value: "$(MINIO_ROOT_PASSWORD)"
            - name: APPFLOWY_GOTRUE_JWT_SECRET
              value: "$(GOTRUE_JWT_SECRET)"
          resources:
            {{- toYaml .Values.appflowyWorker.resources | nindent 12 }}
{{- end }}
