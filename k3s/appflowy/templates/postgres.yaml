apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: appflowy-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: appflowy-postgres
  template:
    metadata:
      labels:
        app: appflowy-postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: postgres-data
          hostPath:
            path: {{ .Values.postgres.storage.hostPath }}
            type: DirectoryOrCreate
        - name: postgres-init
          configMap:
            name: appflowy-postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: appflowy-postgres
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: appflowy-postgres
  ports:
    - port: 5432
      targetPort: 5432
