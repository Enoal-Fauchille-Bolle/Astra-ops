apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-admin
  namespace: {{ .Values.namespace }}
  labels:
    app: appflowy-admin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: appflowy-admin
  template:
    metadata:
      labels:
        app: appflowy-admin
    spec:
      containers:
        - name: admin-frontend
          image: "{{ .Values.adminFrontend.image.repository }}:{{ .Values.adminFrontend.image.tag }}"
          imagePullPolicy: {{ .Values.adminFrontend.image.pullPolicy }}
          env:
            - name: APPFLOWY_BASE_URL
              value: "https://{{ .Values.domain }}"
            - name: APPFLOWY_GOTRUE_BASE_URL
              value: "https://{{ .Values.domain }}/gotrue"
            - name: APPFLOWY_ALLOWED_ORIGINS
              value: "https://{{ .Values.domain }}"
            - name: GOTRUE_URL
              value: "http://appflowy-gotrue:9999"
            - name: APPFLOWY_CLOUD_URL
              value: "http://appflowy-cloud:8000"
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.adminFrontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: appflowy-admin
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: appflowy-admin
  ports:
    - port: 3000
      targetPort: 3000
