apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-cloud
  namespace: {{ .Values.namespace }}
  labels:
    app: appflowy-cloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: appflowy-cloud
  template:
    metadata:
      labels:
        app: appflowy-cloud
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z appflowy-postgres 5432; do sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z appflowy-redis 6379; do sleep 2; done']
        - name: wait-for-gotrue
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z appflowy-gotrue 9999; do sleep 2; done']
        - name: wait-for-search
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z appflowy-search 7700; do sleep 2; done']
      containers:
        - name: appflowy-cloud
          image: "{{ .Values.appflowyCloud.image.repository }}:{{ .Values.appflowyCloud.image.tag }}"
          imagePullPolicy: {{ .Values.appflowyCloud.image.pullPolicy }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: POSTGRES_PASSWORD
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: GOTRUE_JWT_SECRET
            - name: GOTRUE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: GOTRUE_ADMIN_EMAIL
            - name: GOTRUE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appflowy-secrets
                  key: GOTRUE_ADMIN_PASSWORD
            - name: APPFLOWY_ENVIRONMENT
              value: "production"
            - name: APPFLOWY_DATABASE_URL
              value: "postgres://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@appflowy-postgres:5432/{{ .Values.postgres.database }}"
            - name: APPFLOWY_REDIS_URI
              value: "redis://appflowy-redis:6379"
            - name: APPFLOWY_GOTRUE_BASE_URL
              value: "http://appflowy-gotrue:9999"
            - name: APPFLOWY_GOTRUE_EXT_URL
              value: "https://{{ .Values.domain }}/gotrue"
            - name: APPFLOWY_WEB_URL
              value: "https://{{ .Values.domain }}"
            - name: APPFLOWY_GOTRUE_JWT_SECRET
              value: "$(GOTRUE_JWT_SECRET)"
            - name: APPFLOWY_GOTRUE_ADMIN_EMAIL
              value: "$(GOTRUE_ADMIN_EMAIL)"
            - name: APPFLOWY_GOTRUE_ADMIN_PASSWORD
              value: "$(GOTRUE_ADMIN_PASSWORD)"
            - name: APPFLOWY_S3_USE_MINIO
              value: "true"
            - name: APPFLOWY_S3_MINIO_URL
              value: "http://appflowy-minio:9000"
            - name: APPFLOWY_S3_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: APPFLOWY_S3_REGION
              value: {{ .Values.minio.region | quote }}
            - name: APPFLOWY_S3_ACCESS_KEY
              value: "$(MINIO_ROOT_USER)"
            - name: APPFLOWY_S3_SECRET_KEY
              value: "$(MINIO_ROOT_PASSWORD)"
            - name: APPFLOWY_SEARCH_HOST
              value: "http://appflowy-search:7700"
            - name: APPFLOWY_ACCESS_CONTROL
              value: "true"
            - name: APPFLOWY_DATABASE_MAX_CONNECTIONS
              value: "20"
            - name: APPFLOWY_WEBSOCKET_MAILBOX_SIZE
              value: "6000"
          ports:
            - containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          resources:
            {{- toYaml .Values.appflowyCloud.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: appflowy-cloud
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: appflowy-cloud
  ports:
    - port: 8000
      targetPort: 8000
