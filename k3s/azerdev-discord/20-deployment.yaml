apiVersion: apps/v1
kind: Deployment
metadata:
  name: azerdev-discord
  namespace: redirects
  labels:
    app: azerdev-discord
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: azerdev-discord
  template:
    metadata:
      labels:
        app: azerdev-discord
    spec:
      imagePullSecrets:
        - name: regcred-azerdev-discord
      containers:
        - name: azerdev-discord
          image: ghcr.io/enoal-fauchille-bolle/redirector:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: azerdev-discord-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
