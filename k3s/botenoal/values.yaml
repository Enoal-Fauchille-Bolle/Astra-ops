image:
  repository: ghcr.io/enoal-fauchille-bolle/botenoal
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 80
  targetPort: 3000

ingress:
  hosts:
    - botenoal.lan

envFrom:
  - secretRef:
      name: botenoal-secrets

probes:
  liveness:
    path: /status
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /status
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    cpu: 100m
    memory: 256Mi

imagePullSecrets:
  - name: regcred-botenoal

externalSecrets:
  - name: botenoal-es
    targetName: botenoal-secrets
    data:
      - secretKey: token
        remoteRef:
          key: BOTENOAL_TOKEN
      - secretKey: secret
        remoteRef:
          key: BOTENOAL_SECRET
      - secretKey: MongoDB
        remoteRef:
          key: BOTENOAL_MONGODB
      - secretKey: DashboardURL
        remoteRef:
          key: BOTENOAL_DASHBOARD_URL
