# --- REDIS ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-redis
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-redis
  template:
    metadata:
      labels:
        app: immich-redis
    spec:
      containers:
        - name: redis
          image: docker.io/valkey/valkey:9.1
          args: ["--save", "60", "1"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
---
# --- POSTGRES (DB) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-postgres
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-postgres
  template:
    metadata:
      labels:
        app: immich-postgres
    spec:
      containers:
        - name: postgres
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
          envFrom:
            - secretRef:
                name: immich-secrets
            - configMapRef:
                name: immich-config
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "300m"
      volumes:
        - name: pg-data
          hostPath:
            path: /opt/k3s-data/immich/postgres
            type: Directory
---
# --- MACHINE LEARNING ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:v3.0.3
          envFrom:
            - secretRef:
                name: immich-secrets
            - configMapRef:
                name: immich-config
          volumeMounts:
            - name: model-cache
              mountPath: /cache
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "512m"
      volumes:
        - name: model-cache
          hostPath:
            path: /opt/k3s-data/immich/model-cache
            type: Directory
---
# --- IMMICH SERVER (WEB/API) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:v3.0.3
          envFrom:
            - secretRef:
                name: immich-secrets
            - configMapRef:
                name: immich-config
          env:
            - name: IMMICH_MACHINE_LEARNING_URL
              value: "http://immich-machine-learning:3003"
          ports:
            - containerPort: 2283
          volumeMounts:
            - name: library-data
              mountPath: /usr/src/app/upload
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "500m"
      volumes:
        - name: library-data
          hostPath:
            path: /opt/k3s-data/immich/library/
            type: Directory
        - name: localtime
          hostPath:
            path: /etc/localtime
