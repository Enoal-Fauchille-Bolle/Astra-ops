apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashdot
  namespace: monitoring
  labels:
    app: dashdot
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: dashdot
  template:
    metadata:
      labels:
        app: dashdot
    spec:
      containers:
        - name: dashdot
          image: mauricenino/dashdot:v6.2.4
          ports:
            - containerPort: 3001
              protocol: TCP
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          volumeMounts:
            - mountPath: /mnt/host
              name: host-root
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
