apiVersion: v1
kind: Secret
metadata:
  name: criteri-fresque-secrets
  namespace: web
type: Opaque
stringData:
  # Notifications (ntfy.sh)
  NTFY_TOPIC: "your-ntfy-topic"

  # Google Sheets
  GOOGLE_SHEETS_ID: "your-sheet-id"

  # Google Drive Folder IDs
  GOOGLE_DRIVE_FOLDER_SCORES_PREVIEW: "your-folder-id"
  GOOGLE_DRIVE_FOLDER_RAPPORTS_PREVIEW: "your-folder-id"
  GOOGLE_DRIVE_FOLDER_SCORES_FINAL: "your-folder-id"
  GOOGLE_DRIVE_FOLDER_RAPPORTS_FINAL: "your-folder-id"

---
apiVersion: v1
kind: Secret
metadata:
  name: criteri-fresque-google-credentials
  namespace: web
type: Opaque
stringData:
  # Raw JSON content from ./backend/config/google-oauth-credentials.json
  google-oauth-credentials.json: |
    {
      "installed": {
        "client_id": "your-client-id",
        "client_secret": "your-client-secret",
        ...
      }
    }

  # Raw JSON content from ./backend/config/google-service-account.json
  google-service-account.json: |
    {
      "type": "service_account",
      "project_id": "your-project-id",
      ...
    }

# ─────────────────────────────────────────────────────────────────────────
# NOTE on google-oauth-token.json:
#   This file is WRITABLE (the token is regenerated by the backend at runtime).
#   It cannot be a Kubernetes Secret (Secret volumes are read-only).
#   → Inject it manually on the node before the first deployment:
#
#   mkdir -p /mnt/data/criteri-fresque/config
#   cp ./backend/config/google-oauth-token.json \
#      /mnt/data/criteri-fresque/config/google-oauth-token.json
# ─────────────────────────────────────────────────────────────────────────
