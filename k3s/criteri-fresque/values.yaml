namespace: web

# ─────────────────────────────────────────────
# Backend (Node.js / Express)
# ─────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/enoal-fauchille-bolle/criteri-fresque-backend
    tag: 1.2.1
    pullPolicy: Always

  replicaCount: 1

  # Recreate because the oauth-token volume is writable (token refresh)
  strategy:
    type: Recreate

  service:
    port: 50011
    targetPort: 50011

  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "50011"
    - name: API_BASE_URL
      value: "https://beta.criterifresque.lesfresques.info"
    - name: PUPPETEER_EXECUTABLE_PATH
      value: "/usr/bin/chromium"

  # Sensitive variables injected from the criteri-fresque-secrets Secret
  envFrom:
    - secretRef:
        name: criteri-fresque-secrets

  volumes:
    # Runtime data (cold storage)
    output:
      hostPath: /opt/k3s-data/criteri-fresque/output
      mountPath: /app/output
      hostPathType: DirectoryOrCreate
    logs:
      hostPath: /opt/k3s-data/criteri-fresque/logs
      mountPath: /app/logs
      hostPathType: DirectoryOrCreate

    # Shared configuration (frontend + backend) — ConfigMap
    config-shared:
      configMap: criteri-fresque-config-shared
      mountPath: /config.yaml
      subPath: config.yaml

    # Backend configuration only — ConfigMap
    config-backend:
      configMap: criteri-fresque-config-backend
      mountPath: /app/config.yaml
      subPath: config.yaml

    # Google Credentials — Secret (read-only files)
    google-oauth-credentials:
      secret: criteri-fresque-google-credentials
      mountPath: /app/config/google-oauth-credentials.json
      subPath: google-oauth-credentials.json
      readOnly: true
    google-service-account:
      secret: criteri-fresque-google-credentials
      mountPath: /app/config/google-service-account.json
      subPath: google-service-account.json
      readOnly: true

    # OAuth Token — hostPath WRITABLE (token is regenerated by the backend)
    # ⚠️  Create the file manually before the first deployment:
    #    mkdir -p /opt/k3s-data/criteri-fresque/config
    #    cp ./backend/config/google-oauth-token.json /opt/k3s-data/criteri-fresque/config/
    google-oauth-token:
      hostPath: /opt/k3s-data/criteri-fresque/config/google-oauth-token.json
      mountPath: /app/config/google-oauth-token.json
      hostPathType: FileOrCreate

  probes:
    readiness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 10

  resources:
    requests:
      cpu: 100m
      memory: 450Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  imagePullSecrets:
    - name: regcred-criteri-fresque

# ─────────────────────────────────────────────
# Frontend (nginx)
# ─────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/enoal-fauchille-bolle/criteri-fresque-frontend
    tag: 1.2.1
    pullPolicy: Always

  replicaCount: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  service:
    port: 80
    targetPort: 80

  volumes:
    # Configuration shared mounted in nginx to be served statically
    config-shared:
      configMap: criteri-fresque-config-shared
      mountPath: /usr/share/nginx/html/config.yaml
      subPath: config.yaml

  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

  imagePullSecrets:
    - name: regcred-criteri-fresque

# ─────────────────────────────────────────────
# Ingress (path-based routing via Traefik)
# ─────────────────────────────────────────────
ingress:
  enabled: true
  host: beta.criterifresque.lesfresques.info
