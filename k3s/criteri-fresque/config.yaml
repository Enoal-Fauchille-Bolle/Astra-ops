# Descriptions of the levels for each criterion
criteriaDescriptions:
  C1:
    0: "Aucune info disponible"
    1: "Basé sur savoir empirique"
    2: "Données débattues, limitées"
    3: "Données reconnues, incomplètes"
    4: "Consensus scientifique validé"
  C2:
    0: "Hors transition"
    1: "Respect donut seulement"
    2: "Transition partielle"
    3: "Transition majoritaire"
    4: "100% transition"
  C3:
    0: "Aucune doc disponible"
    1: "Documentation artisanale"
    2: "Supports pro et clairs"
    3: "Ressources riches et variées"
    4: "Écosystème interactif"
  E1:
    0: "Aucune implication"
    1: "Participation légère"
    2: "Participation active"
    3: "Forte implication"
    4: "Co-création totale"
  E2:
    0: "Aucune immersion"
    1: "Sensibilité légère"
    2: "Émotions limitées"
    3: "Immersion riche"
    4: "Expérience totale"
  E3:
    0: "Aucune accessibilité"
    1: "Quelques adaptations"
    2: "Accessibilité partielle"
    3: "Accessibilité forte"
    4: "Accessibilité universelle"
  S1:
    0: "Aucune reconnaissance"
    1: "Pas de reconnaissance"
    2: "Une reconnaissance"
    3: "Nombreuses reconnaissances"
    4: "Devenu un standard"
  S2:
    0: "Aucune activité"
    1: "Moins de 20 ateliers/an"
    2: "20 à 199 ateliers/an"
    3: "200 à 999 ateliers/an"
    4: "Plus de 1000 ateliers/an"
  S3:
    0: "Aucun déploiement"
    1: "Quelques régions France"
    2: "Plusieurs pays francophones"
    3: ">10 pays et 3 langues"
    4: ">20 pays dans le monde"
  S4:
    0: "Aucune info animateurs"
    1: "Moins de 10 formés"
    2: "10 à 199 formés"
    3: "200 à 1999 formés"
    4: "Plus de 2000 formés"
  P1:
    0: "Aucune transparence"
    1: "Infos floues, partielles"
    2: "Infos claires limitées"
    3: "Transparence complète"
    4: "Transparence exemplaire"
  P2:
    0: "Aucune info organisation"
    1: "Organisation minimale"
    2: "Personne morale dédiée"
    3: "Gouvernance transparente"
    4: "Structure solide et pérenne"
  P3:
    0: "Aucune formation prévue"
    1: "Formation basique"
    2: "Formation initiale + outils"
    3: "Parcours complet validé"
    4: "Formation reconnue externe"
  P4:
    0: "Aucun suivi d'impact"
    1: "Données de satisfaction"
    2: "Sondages ponctuels"
    3: "Évaluations structurées"
    4: "Études scientifiques"

