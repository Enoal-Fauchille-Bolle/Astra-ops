# --- POSTGRES ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanopy-postgres
  namespace: utilities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scanopy-postgres
  template:
    metadata:
      labels:
        app: scanopy-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          envFrom:
            - secretRef:
                name: scanopy-postgres-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-data
          hostPath:
            path: /opt/k3s-data/scanopy/postgres
            type: DirectoryOrCreate

---
# --- DAEMON ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanopy-daemon
  namespace: utilities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scanopy-daemon
  template:
    metadata:
      labels:
        app: scanopy-daemon
    spec:
      containers:
        - name: daemon
          image: ghcr.io/scanopy/scanopy/daemon:v0.17.2
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          env:
            - name: SCANOPY_LOG_LEVEL
              value: "info"
            - name: SCANOPY_SERVER_PORT
              value: "60072"
            - name: SCANOPY_DAEMON_PORT
              value: "60073"
            # Pointe vers le service K8s du serveur
            - name: SCANOPY_SERVER_URL
              value: "http://scanopy-server:60072"
            - name: SCANOPY_BIND_ADDRESS
              value: "0.0.0.0"
            - name: SCANOPY_MODE
              value: "Push"
            - name: SCANOPY_NETWORK_ID
              value: "b2c03dcf-45df-4a37-8bf6-4b13bef3bd1a"
            - name: SCANOPY_DAEMON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: scanopy-postgres-secret
                  key: SCANOPY_API_KEY
            - name: SCANOPY_NAME
              value: "pulsar"
          ports:
            - containerPort: 60073
          volumeMounts:
            - name: daemon-config
              mountPath: /root/.config/daemon
            - name: docker-sock
              mountPath: /var/run/docker.sock
              readOnly: true
      volumes:
        - name: daemon-config
          hostPath:
            path: /opt/k3s-data/scanopy/daemon-config
            type: DirectoryOrCreate
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket

---
# --- SERVER ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanopy-server
  namespace: utilities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scanopy-server
  template:
    metadata:
      labels:
        app: scanopy-server
    spec:
      containers:
        - name: server
          image: ghcr.io/scanopy/scanopy/server:v0.17.2
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: scanopy-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scanopy-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: scanopy-postgres-secret
                  key: POSTGRES_DB
            - name: SCANOPY_LOG_LEVEL
              value: "info"
            - name: SCANOPY_SERVER_PORT
              value: "60072"
            - name: SCANOPY_DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@scanopy-postgres:5432/$(POSTGRES_DB)"
            - name: SCANOPY_WEB_EXTERNAL_PATH
              value: "/app/static"
            - name: SCANOPY_PUBLIC_URL
              value: "https://scanopy.enoal.fr"
            - name: SCANOPY_INTEGRATED_DAEMON_URL
              value: "http://scanopy-daemon:60073"
          ports:
            - containerPort: 60072
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /opt/k3s-data/scanopy/data
            type: DirectoryOrCreate
