namespace: media

image:
  repository: docker.io/filebrowser/filebrowser
  tag: v2.63.5
  pullPolicy: IfNotPresent

replicaCount: 1

strategy:
  type: Recreate

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  hosts:
    - drive.enoal.fr
    - filebrowser.lan

volumes:
  files:
    hostPath: /mnt/data/k3s-pvc/filebrowser
    mountPath: /srv
  media:
    hostPath: /mnt/data/media
    mountPath: /srv/Media
  backups:
    hostPath: /mnt/data/backups
    mountPath: /srv/Backups
  db:
    hostPath: /opt/k3s-data/filebrowser
    mountPath: /database

securityContext:
  runAsUser: 0

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 512Mi
