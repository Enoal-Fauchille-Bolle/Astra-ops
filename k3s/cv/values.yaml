namespace: web

image:
  repository: ghcr.io/enoal-fauchille-bolle/cv
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 80
  targetPort: 50021

ingress:
  hosts:
    - cv-astra.enoal.fr

probes:
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    cpu: 10m
    memory: 100Mi
  limits:
    cpu: 100m
    memory: 256Mi

imagePullSecrets:
  - name: regcred-cv

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  scaleUpStabilizationSeconds: 30
  scaleUpMaxPods: 1
  scaleDownStabilizationSeconds: 300
