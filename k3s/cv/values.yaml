namespace: web

image:
  repository: ghcr.io/enoal-fauchille-bolle/cv
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  port: 80
  targetPort: 80

ingress:
  hosts:
    - cv-astra.enoal.fr

probes:
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

imagePullSecrets:
  - name: regcred-cv

autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  scaleUpStabilizationSeconds: 0
  scaleUpMaxPods: 4
  scaleDownStabilizationSeconds: 300
