namespace: web

image:
  repository: ghcr.io/enoal-fauchille-bolle/cv
  tag: 2.3.2
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 80
  targetPort: 80

ingress:
  hosts:
    - cv.enoal.fr

probes:
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi

imagePullSecrets:
  - name: regcred-cv

autoscaling:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  scaleUpStabilizationSeconds: 0
  scaleUpMaxPods: 4
  scaleDownStabilizationSeconds: 300
