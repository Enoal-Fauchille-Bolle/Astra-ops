apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: web
  labels:
    app: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      imagePullSecrets:
        - name: regcred-portfolio
      containers:
        - name: portfolio
          image: ghcr.io/enoal-fauchille-bolle/portfolio:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
