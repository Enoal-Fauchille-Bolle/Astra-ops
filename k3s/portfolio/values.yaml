namespace: web

image:
  repository: ghcr.io/enoal-fauchille-bolle/portfolio
  tag: 1.1.0
  pullPolicy: IfNotPresent

replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  hosts:
    - portfolio.enoal.fr
    - enoal.fr
    - www.enoal.fr

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi

imagePullSecrets:
  - name: regcred-portfolio
