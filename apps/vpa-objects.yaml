apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpa-objects
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/enoal-fauchille-bolle/astra-ops.git
    targetRevision: HEAD
    path: infra/vpa
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
