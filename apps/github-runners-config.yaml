apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-runners-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/enoal-fauchille-bolle/astra-ops.git
    targetRevision: HEAD
    path: k3s/github-runners
  destination:
    server: https://kubernetes.default.svc
    namespace: github-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
