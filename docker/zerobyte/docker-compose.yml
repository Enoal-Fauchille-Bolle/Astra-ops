services:
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:v0.39
    container_name: zerobyte
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      - "4096:4096"
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      - TZ=Europe/Paris
      - BASE_URL=http://zerobyte.lan
      - APP_SECRET=${APP_SECRET}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/zerobyte:/var/lib/zerobyte
      - ${RCLONE_CONFIG_PATH}:/root/.config/rclone:ro
      # Read-only mounts for various services
      - /opt/docker-data/npm:/data/npm:ro # Nginx Proxy Manager
      - /opt/k3s-data/homer:/data/homer:ro # Homer
      - /opt/docker-data/portainer:/data/portainer:ro # Portainer
      - /opt/k3s-data/docker-registry:/data/docker-registry:ro # Docker Registry
      - /mnt/data/k3s-pvc/filebrowser:/data/filebrowser:ro # File Browser
      - /opt/k3s-data/criteri-fresque:/data/criteri-fresque:ro # Criteri Fresque
      - /opt/docker-data/crafty/config:/data/crafty/config:ro # Crafty Config
      - /opt/docker-data/crafty/backups:/data/crafty/backups:ro # Crafty Backups
      - /opt/k3s-data/immich:/data/immich:ro # Immich
      - /opt/k3s-data/vaultwarden:/data/vaultwarden:ro # Vaultwarden
      - /opt/k3s-data/n8n:/data/n8n:ro # n8n
      - /opt/k3s-data/scanopy:/data/scanopy:ro # Scanopy
      - /opt/k3s-data/uptimekuma:/data/uptimekuma:ro # Uptime Kuma
      - /opt/k3s-data/sftpgo:/data/sftpgo:ro # SFTPGo
      - /opt/docker-data/crowdsec:/data/crowdsec:ro # CrowdSec
      - /opt/k3s-data/filebrowser-quantum:/data/filebrowser-quantum:ro # File Browser Quantum
      - /mnt/data/backups:/data/backups:ro # Backups
      - /mnt/data/media/photos:/data/media/photos:ro # Photos
