services:
    speedtest-tracker:
        image: lscr.io/linuxserver/speedtest-tracker:latest
        restart: unless-stopped
        container_name: speedtest-tracker
        ports:
            - 8083:80
            - 8444:443
        environment:
            - PUID=1000
            - PGID=1000
            - APP_URL=http://speedtest-tracker.lan
            - APP_KEY=${APP_KEY}
            - DB_CONNECTION=sqlite
        volumes:
            - /opt/docker/speedtest-tracker:/config
