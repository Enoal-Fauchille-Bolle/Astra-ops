services:
  app:
    image: jc21/nginx-proxy-manager:2.14.0
    container_name: nginx-proxy-manager
    restart: unless-stopped
    environment:
      TZ: "Europe/Paris"
    network_mode: host
    volumes:
      - /opt/docker-data/npm/data:/data
      - /opt/docker-data/npm/letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
