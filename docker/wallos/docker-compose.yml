services:
  wallos:
    container_name: wallos
    image: bellamy/wallos:5.4.2
    ports:
      - "8282:80/tcp"
    environment:
      TZ: 'Europe/Paris'
    volumes:
      - /opt/docker-data/wallos/db:/var/www/html/db
      - /opt/docker-data/wallos/logos:/var/www/html/images/uploads/logos
    restart: unless-stopped
